<!-- =============================================================================
     components/hero.html — Seção inicial (tela cheia)
============================================================================= -->

<section id="home" class="relative min-h-screen flex items-center justify-center overflow-hidden pt-20">

    
    <div class="absolute inset-0 hero-grid pointer-events-none"></div>

    <div class="absolute top-0 left-0 w-[600px] h-[600px] bg-neon/5 rounded-full blur-[120px] pointer-events-none"></div>
    <div class="absolute top-1/4 right-0 w-[400px] h-[400px] bg-electric/5 rounded-full blur-[100px] pointer-events-none"></div>
    <div class="absolute bottom-0 left-1/3 w-[500px] h-[500px] bg-neon/3 rounded-full blur-[150px] pointer-events-none"></div>

    <div id="particles" class="absolute inset-0 pointer-events-none overflow-hidden"></div>

    <!-- Conteúdo principal -->
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 w-full py-20">
        <div class="flex flex-col-reverse lg:flex-row items-center gap-16 lg:gap-20">

            <!-- ===== COLUNA ESQUERDA: Texto + Botões + Social ===== -->
            <div class="flex-1 text-center lg:text-left space-y-7">

                <!-- Badge de status com ponto pulsante -->
                <div class="hero-element inline-flex items-center gap-2 px-4 py-2 rounded-full border border-neon/25 bg-neon/5 text-neon text-xs font-mono tracking-widest uppercase">
                    <span class="w-2 h-2 rounded-full bg-neon animate-pulse"></span>
                    Ciência da Computação
                </div>

                <!-- Título principal com fonte display grande -->
                <div class="hero-element">
                    <p class="text-gray-400 text-lg font-light mb-2 tracking-wide">Olá, eu sou</p>
                    <h1 class="text-5xl sm:text-6xl md:text-7xl font-display font-bold text-white leading-none tracking-tight">
                        Luiz
                        <span class="block text-transparent bg-clip-text bg-gradient-to-r from-neon via-emerald-300 to-neon glow-text"
                              style="background-size: 200%; animation: textGlow 3s ease-in-out infinite, gradientShift 4s ease infinite;">
                            Henrique
                        </span>
                    </h1>
                </div>

                <!-- Descrição rápida -->
                <p class="hero-element text-gray-400 text-lg max-w-md mx-auto lg:mx-0 leading-relaxed font-light">
                    Transformando lógica em soluções reais. <br>
                    <span class="text-gray-300">Explorando o universo do</span>
                    <span class="text-neon font-mono"> Backend</span> &
                    <span class="text-electric font-mono"> Inteligência Artificial.</span>
                </p>

                <!-- Botões de ação principais -->
                <div class="hero-element flex flex-col sm:flex-row gap-4 justify-center lg:justify-start">
                    
                    <button onclick="scrollToSection('projetos')"
                            class="btn-primary relative px-8 py-3.5 bg-neon text-[#020817] font-bold font-display text-sm tracking-wider rounded hover:scale-105 transition-transform shadow-[0_0_30px_rgba(0,255,157,0.3)] z-10">
                        Ver Projetos <span class="ml-2">→</span>
                    </button>
                    
                    <button onclick="scrollToSection('contato')"
                            class="px-8 py-3.5 border border-white/20 text-white font-medium text-sm rounded hover:border-neon/50 hover:text-neon hover:bg-neon/5 transition-all">
                        Falar Comigo
                    </button>
                </div>

                <!-- Ícones das redes sociais -->
                <div class="hero-element flex justify-center lg:justify-start gap-5 pt-2">
                    <a href="https://github.com/luizhrx" target="_blank"
                       class="social-icon w-10 h-10 rounded border border-white/10 flex items-center justify-center text-gray-500 hover:text-white hover:border-white/30 hover:bg-white/5 transition-all">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12z"/>
                        </svg>
                    </a>
                    <a href="https://www.linkedin.com/in/luizhrx/" target="_blank"
                       class="social-icon w-10 h-10 rounded border border-white/10 flex items-center justify-center text-gray-500 hover:text-[#0077b5] hover:border-[#0077b5]/50 hover:bg-[#0077b5]/10 transition-all">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 0 1-2.063-2.065 2.064 2.064 0 1 1 2.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/>
                        </svg>  
                    </a>
                    <a href="https://instagram.com/_luizhrx" target="_blank"
                       class="social-icon w-10 h-10 rounded border border-white/10 flex items-center justify-center text-gray-500 hover:text-pink-400 hover:border-pink-400/50 hover:bg-pink-400/10 transition-all">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zM12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.052.014 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98C8.333 23.986 8.741 24 12 24c3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98C15.668.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 1 0 0 12.324 6.162 6.162 0 0 0 0-12.324zM12 16a4 4 0 1 1 0-8 4 4 0 0 1 0 8zm6.406-11.845a1.44 1.44 0 1 0 0 2.881 1.44 1.44 0 0 0 0-2.881z"/>
                        </svg>
                    </a>
                </div>
            </div>

            <!-- ===== COLUNA DIREITA: Foto com anéis decorativos ===== -->
            <div class="flex-1 flex justify-center items-center">
                <div class="relative w-72 h-72 md:w-80 md:h-80">

                    
                    <div class="absolute -inset-4 rounded-full"
                         style="background: conic-gradient(from 0deg, transparent 50%, rgba(0,255,157,0.4) 100%); animation: spinSlow 4s linear infinite; filter: blur(8px);"></div>

                    
                    <div class="absolute inset-0 rounded-full border-2 border-dashed border-neon/30 spin-slow"></div>

                    
                    <div class="absolute inset-2 rounded-full border border-neon/15 spin-reverse"
                         style="border-style: dashed; border-width: 1px;"></div>

                    <!-- Foto principal -->
                    <div class="absolute inset-4 rounded-full overflow-hidden bg-slate-900 border-2 border-neon/30"
                         style="box-shadow: 0 0 40px rgba(0,255,157,0.2), inset 0 0 40px rgba(0,0,0,0.5);">
                        <img src="img/fotoDeLuiz.png" alt="Luiz Henrique" class="-mt-10 "
                            
                             onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
                        
                        <div class="hidden w-full h-full items-center justify-center flex-col gap-2 text-gray-600">
                            <i data-lucide="user" class="w-16 h-16"></i>
                            <span class="text-xs font-mono text-neon/50">foto.png</span>
                        </div>
                    </div>

                    
                    <div class="absolute -top-1 -right-1 w-3 h-3 rounded-full bg-neon"
                         style="box-shadow: 0 0 10px rgba(0,255,157,0.8);"></div>
                    <div class="absolute -bottom-1 -left-1 w-2 h-2 rounded-full bg-electric"
                         style="box-shadow: 0 0 8px rgba(59,130,246,0.8);"></div>
                    <div class="absolute top-1/2 -right-3 w-1.5 h-1.5 rounded-full bg-neon/60"></div>
                </div>
            </div>
        </div>

        
        <div class="absolute bottom-8 left-1/2 transform -translate-x-1/2 flex flex-col items-center gap-2 animate-bounce text-gray-600">
            <span class="text-xs font-mono tracking-widest uppercase">scroll</span>
            <i data-lucide="chevron-down" class="w-4 h-4"></i>
        </div>
    </div>
</section>
